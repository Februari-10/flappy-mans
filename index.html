<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlappyMåns 🐦</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="title">🐦 FlappyMåns 🐦</div>

  <div id="gameWrapper">
    <canvas id="canvas" width="400" height="580"></canvas>
    <div id="scoreDisplay" style="display:none">0</div>
    <div id="hiScore" style="display:none">HI: 0</div>

    <div id="menuScreen" class="screen">
      <div class="screen-logo">
        <div class="logo-bird">🐦</div>
        <h1>FLAPPY<br>MÅNS</h1>
      </div>

      <div class="menu-controls">
        <p>SPACE / CLICK / TAP to flap</p>
      </div>

      <div class="menu-buttons">
        <button class="btn btn-primary" id="startBtn">▶ START GAME</button>
        <button class="btn btn-secondary" id="optionsBtn">⚙ OPTIONS</button>
      </div>

      <div class="menu-footer">
        <span>🥉 5pts</span>
        <span>🥈 15pts</span>
        <span>🥇 30pts</span>
      </div>
    </div>

    <div id="optionsScreen" class="screen" style="display:none">
      <h2 class="options-title">⚙ OPTIONS</h2>

      <div class="options-list">
        <div class="option-row">
          <div class="option-info">
            <span class="option-name">ISAC MODE</span>
            <span class="option-desc">Background become Isac</span>
          </div>
          <div class="toggle-wrap" id="isacToggle">
            <div class="toggle-track">
              <div class="toggle-thumb"></div>
            </div>
          </div>
        </div>

        <div class="option-row">
          <div class="option-info">
            <span class="option-name">EDUARDO MODE</span>
            <span class="option-desc">Background become Eduardo</span>
          </div>
          <div class="toggle-wrap" id="eduardoToggle">
            <div class="toggle-track">
              <div class="toggle-thumb"></div>
            </div>
          </div>
        </div>
      </div>

      <button class="btn btn-secondary" id="optionsBackBtn">← BACK</button>
    </div>

    <div id="deathScreen" class="screen" style="display:none">
      <h2 class="death-title">GAME OVER</h2>

      <div id="deathMedal" class="death-medal">💀</div>

      <div class="death-scores">
        <div class="score-row">
          <span class="score-label">SCORE</span>
          <span class="score-value" id="deathScore">0</span>
        </div>
        <div class="score-divider"></div>
        <div class="score-row">
          <span class="score-label">BEST</span>
          <span class="score-value gold" id="deathBest">0</span>
        </div>
      </div>

      <div class="death-buttons">
        <button class="btn btn-primary" id="restartBtn">▶ PLAY AGAIN</button>
        <button class="btn btn-secondary" id="menuBtn">⌂ MAIN MENU</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlappyMåns 🐦</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a0533;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: 'Press Start 2P', monospace;
    overflow: hidden;
  }

  #title {
    color: #ffdd00;
    font-size: 28px;
    text-shadow: 4px 4px 0 #ff6600, 8px 8px 0 #cc0000;
    margin-bottom: 16px;
    letter-spacing: 2px;
    animation: titlePulse 1.5s ease-in-out infinite alternate;
  }

  @keyframes titlePulse {
    from { transform: scale(1); }
    to { transform: scale(1.04); }
  }

  #gameWrapper {
    position: relative;
    border: 4px solid #ffdd00;
    box-shadow: 0 0 30px #ffdd0066, 0 0 60px #ff660033;
  }

  canvas {
    display: block;
    background: #70c5ce;
  }

  #overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(10, 0, 30, 0.82);
    color: #fff;
    text-align: center;
    padding: 20px;
    gap: 18px;
  }

  #overlay h2 {
    font-size: 18px;
    color: #ffdd00;
    text-shadow: 3px 3px 0 #cc6600;
    line-height: 1.6;
  }

  #overlay p {
    font-size: 9px;
    color: #aaa;
    line-height: 1.8;
  }

  .btn {
    background: #ffdd00;
    color: #1a0533;
    border: none;
    padding: 12px 24px;
    font-family: 'Press Start 2P', monospace;
    font-size: 11px;
    cursor: pointer;
    border-radius: 2px;
    box-shadow: 4px 4px 0 #cc6600;
    transition: transform 0.1s, box-shadow 0.1s;
  }
  .btn:hover { transform: translate(2px,2px); box-shadow: 2px 2px 0 #cc6600; }
  .btn:active { transform: translate(4px,4px); box-shadow: none; }

  #fileLabel {
    background: #00c8ff;
    color: #1a0533;
    border: none;
    padding: 10px 18px;
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    cursor: pointer;
    border-radius: 2px;
    box-shadow: 4px 4px 0 #006688;
    display: inline-block;
    transition: transform 0.1s, box-shadow 0.1s;
  }
  #fileLabel:hover { transform: translate(2px,2px); box-shadow: 2px 2px 0 #006688; }

  #fileInput { display: none; }

  #imgPreview {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    border: 3px solid #ffdd00;
    object-fit: cover;
    display: none;
  }

  #scoreDisplay {
    position: absolute;
    top: 14px;
    left: 50%;
    transform: translateX(-50%);
    color: #fff;
    font-size: 22px;
    text-shadow: 2px 2px 0 #000, -1px -1px 0 #000;
    pointer-events: none;
    z-index: 10;
  }

  #hiScore {
    position: absolute;
    top: 14px;
    right: 12px;
    color: #ffdd00;
    font-size: 8px;
    text-shadow: 1px 1px 0 #000;
    pointer-events: none;
    z-index: 10;
  }

  #medals {
    display: flex;
    gap: 8px;
    font-size: 20px;
  }
</style>
</head>
<body>

<div id="title">🐦 FlappyMåns 🐦</div>

<div id="gameWrapper">
  <canvas id="canvas" width="400" height="580"></canvas>
  <div id="scoreDisplay" style="display:none">0</div>
  <div id="hiScore" style="display:none">HI: 0</div>

  <div id="overlay">
    <h2>FLAPPY<br>MÅNS</h2>
    <div id="medals">🏅🎮🕹️</div>

    <label id="fileLabel" for="fileInput">
      📸 LOAD MÅNS.JPG
    </label>
    <input type="file" id="fileInput" accept="image/*">
    <img id="imgPreview" alt="Måns preview">

    <p>Click or press SPACE / tap<br>to flap Måns!</p>

    <button class="btn" id="startBtn">▶ START GAME</button>
  </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const startBtn = document.getElementById('startBtn');
const scoreDisplay = document.getElementById('scoreDisplay');
const hiScoreDisplay = document.getElementById('hiScore');
const fileInput = document.getElementById('fileInput');
const imgPreview = document.getElementById('imgPreview');

const W = canvas.width, H = canvas.height;

// --- Game State ---
let state = 'idle'; // idle, playing, dead
let score = 0, hiScore = 0;
let mansImg = new Image();
mansImg.src = 'mans2.jpg';
let animFrame = null;

// Bird
const bird = {
  x: 90, y: H/2, vy: 0,
  w: 52, h: 52,
  gravity: 0.5,
  jumpForce: -9,
  rotation: 0,
  flapAnim: 0
};

// Pipes
const PIPE_W = 60;
const PIPE_GAP = 160;
const PIPE_SPEED = 2.8;
let pipes = [];
let pipeTimer = 0;
const PIPE_INTERVAL = 90;

// Ground
const GROUND_H = 80;
let groundX = 0;

// Clouds
let clouds = [{x:60,y:60,s:1},{x:200,y:100,s:0.8},{x:320,y:50,s:1.2}];

// Load image
fileInput.addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const url = URL.createObjectURL(file);
  const img = new Image();
  img.onload = () => {
    mansImg = img;
    imgPreview.src = url;
    imgPreview.style.display = 'block';
  };
  img.src = url;
});

function resetGame() {
  bird.y = H / 2;
  bird.vy = 0;
  bird.rotation = 0;
  pipes = [];
  pipeTimer = 0;
  score = 0;
  groundX = 0;
  scoreDisplay.textContent = '0';
  clouds = [{x:60,y:60,s:1},{x:200,y:100,s:0.8},{x:320,y:50,s:1.2}];
}

function flap() {
  if (state === 'playing') {
    bird.vy = bird.jumpForce;
    bird.flapAnim = 8;
  }
}

startBtn.addEventListener('click', () => {
  resetGame();
  state = 'playing';
  overlay.style.display = 'none';
  scoreDisplay.style.display = 'block';
  hiScoreDisplay.style.display = 'block';
  if (animFrame) cancelAnimationFrame(animFrame);
  loop();
});

document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp') {
    e.preventDefault();
    flap();
  }
});
canvas.addEventListener('click', flap);
canvas.addEventListener('touchstart', e => { e.preventDefault(); flap(); });

// Drawing helpers
function drawSky() {
  const grad = ctx.createLinearGradient(0,0,0,H - GROUND_H);
  grad.addColorStop(0, '#5ec0d8');
  grad.addColorStop(1, '#a8e6f0');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H - GROUND_H);
}

function drawClouds() {
  clouds.forEach(c => {
    ctx.save();
    ctx.translate(c.x, c.y);
    ctx.scale(c.s, c.s);
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    ctx.beginPath();
    ctx.arc(0, 0, 25, 0, Math.PI*2);
    ctx.arc(28, -8, 20, 0, Math.PI*2);
    ctx.arc(55, 0, 22, 0, Math.PI*2);
    ctx.arc(28, 8, 22, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  });
}

function drawGround() {
  // dirt
  ctx.fillStyle = '#ded895';
  ctx.fillRect(0, H - GROUND_H, W, GROUND_H);
  // grass strip
  ctx.fillStyle = '#5daf1b';
  ctx.fillRect(0, H - GROUND_H, W, 18);

  // scrolling grass dashes
  ctx.fillStyle = '#4a9414';
  for (let x = (groundX % 40) - 40; x < W + 40; x += 40) {
    ctx.fillRect(x, H - GROUND_H, 20, 8);
  }
}

function drawPipe(x, topH) {
  const gapTop = topH;
  const gapBot = topH + PIPE_GAP;

  // Pipe body - top
  const pipeGrad = ctx.createLinearGradient(x, 0, x + PIPE_W, 0);
  pipeGrad.addColorStop(0, '#3a9b3a');
  pipeGrad.addColorStop(0.4, '#5ecb5e');
  pipeGrad.addColorStop(1, '#2a7a2a');
  ctx.fillStyle = pipeGrad;
  ctx.fillRect(x, 0, PIPE_W, gapTop - 14);

  // Cap top
  ctx.fillStyle = '#2a7a2a';
  ctx.fillRect(x - 5, gapTop - 28, PIPE_W + 10, 28);
  ctx.fillStyle = '#5ecb5e';
  ctx.fillRect(x - 3, gapTop - 26, PIPE_W + 2, 6);

  // Pipe body - bottom
  ctx.fillStyle = pipeGrad;
  ctx.fillRect(x, gapBot + 14, PIPE_W, H - GROUND_H - gapBot - 14);

  // Cap bottom
  ctx.fillStyle = '#2a7a2a';
  ctx.fillRect(x - 5, gapBot, PIPE_W + 10, 28);
  ctx.fillStyle = '#5ecb5e';
  ctx.fillRect(x - 3, gapBot + 20, PIPE_W + 2, 6);
}

function drawBird() {
  ctx.save();
  ctx.translate(bird.x, bird.y);
  ctx.rotate(Math.min(Math.max(bird.rotation, -0.5), 1.2));

  if (mansImg) {
    // Draw circular clipped image
    ctx.save();
    ctx.beginPath();
    ctx.arc(0, 0, bird.w/2, 0, Math.PI*2);
    ctx.closePath();
    ctx.clip();
    ctx.drawImage(mansImg, -bird.w/2, -bird.h/2, bird.w, bird.h);
    ctx.restore();

    // Glowing ring
    ctx.beginPath();
    ctx.arc(0, 0, bird.w/2 + 2, 0, Math.PI*2);
    ctx.strokeStyle = bird.flapAnim > 0 ? '#ffff00' : '#fff';
    ctx.lineWidth = 3;
    ctx.stroke();
  } else {
    // Fallback face emoji
    ctx.font = `${bird.w}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('😎', 0, 2);
  }
  ctx.restore();
}

function spawnPipe() {
  const minTop = 60;
  const maxTop = H - GROUND_H - PIPE_GAP - 60;
  const topH = Math.floor(Math.random() * (maxTop - minTop) + minTop);
  pipes.push({ x: W + 10, topH, scored: false });
}

function checkCollision() {
  const r = bird.w / 2 - 4;
  // Ground / ceiling
  if (bird.y + r >= H - GROUND_H || bird.y - r <= 0) return true;

  for (const p of pipes) {
    const px = p.x, pw = PIPE_W;
    const bx = bird.x, by = bird.y;
    if (bx + r > px - 5 && bx - r < px + pw + 5) {
      if (by - r < p.topH - 14 || by + r > p.topH + PIPE_GAP + 14) {
        return true;
      }
    }
  }
  return false;
}

function showDeathScreen() {
  overlay.innerHTML = `
    <h2>GAME OVER</h2>
    <div style="font-size:9px;color:#ccc;line-height:2">
      SCORE: <span style="color:#ffdd00">${score}</span><br>
      BEST: <span style="color:#ffdd00">${hiScore}</span>
    </div>
    <div id="medals">${score >= 30 ? '🥇' : score >= 15 ? '🥈' : score >= 5 ? '🥉' : '💀'}</div>
    <button class="btn" id="startBtn">▶ PLAY AGAIN</button>
  `;
  overlay.style.display = 'flex';
  document.getElementById('startBtn').addEventListener('click', () => {
    resetGame();
    state = 'playing';
    overlay.style.display = 'none';
    if (animFrame) cancelAnimationFrame(animFrame);
    loop();
  });
}

let particles = [];
function spawnScoreParticles(x, y) {
  for (let i = 0; i < 6; i++) {
    particles.push({
      x, y,
      vx: (Math.random()-0.5)*4,
      vy: -Math.random()*4 - 2,
      life: 40,
      maxLife: 40,
      color: Math.random() > 0.5 ? '#ffdd00' : '#ffffff'
    });
  }
}

function updateParticles() {
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy; p.vy += 0.15; p.life--;
    const a = p.life / p.maxLife;
    ctx.save();
    ctx.globalAlpha = a;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 4, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  });
}

function loop() {
  ctx.clearRect(0,0,W,H);
  drawSky();
  drawClouds();

  if (state === 'playing') {
    // Update bird
    bird.vy += bird.gravity;
    bird.y += bird.vy;
    bird.rotation = bird.vy * 0.08;
    if (bird.flapAnim > 0) bird.flapAnim--;

    // Update ground
    groundX -= PIPE_SPEED;
    if (groundX < -40) groundX = 0;

    // Update clouds
    clouds.forEach(c => { c.x -= 0.5 * c.s; if (c.x < -80) c.x = W + 80; });

    // Pipe spawning
    pipeTimer++;
    if (pipeTimer >= PIPE_INTERVAL) { spawnPipe(); pipeTimer = 0; }

    // Update pipes
    pipes.forEach(p => {
      p.x -= PIPE_SPEED;
      if (!p.scored && p.x + PIPE_W < bird.x) {
        p.scored = true;
        score++;
        scoreDisplay.textContent = score;
        if (score > hiScore) { hiScore = score; hiScoreDisplay.textContent = 'HI: ' + hiScore; }
        spawnScoreParticles(bird.x + 60, bird.y);
      }
    });
    pipes = pipes.filter(p => p.x > -PIPE_W - 20);

    // Draw pipes
    pipes.forEach(p => drawPipe(p.x, p.topH));

    // Collision
    if (checkCollision()) {
      state = 'dead';
      setTimeout(showDeathScreen, 600);
    }
  } else {
    // Idle float
    bird.y = H/2 + Math.sin(Date.now()/400) * 10;
    clouds.forEach(c => { c.x -= 0.3 * c.s; if (c.x < -80) c.x = W + 80; });
  }

  drawGround();
  updateParticles();
  drawBird();

  animFrame = requestAnimationFrame(loop);
}

// Start idle animation
loop();
</script>
</body>
</html>
